<!DOCTYPE html>
<html lang="pt-PT">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DoseCalc Pro - PCR</title>

    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="container">

    <div class="logo">
        <h1>❤️ DoseCalc SIV</h1>
        <p>PCR Pediátrica</p>
    </div>

<div class="medicamento">

    <h2>Adrenalina</h2>

    <div class="info">

        <p><strong>Indicação</strong></p>
        <p>PCR Pediátrica</p>

        <br>

        <p><strong>Apresentação</strong></p>
        <p>1 mg / 1 ml</p>

        <br>

        <p><strong>Diluição</strong></p>
        <p>1 ml de Adrenalina + 9 ml NaCl 0,9%</p>

        <p>Retirar depois 1 ml para seringa de insulina</p>

        <br>

        <p><strong>Dose</strong></p>
        <p>0,01 mg/kg EV ou IO</p>

    </div>

    <label>Peso da criança (kg)</label>

    <input
        type="number"
        id="pesoAdrenalina"
        placeholder="Ex.: 18">

    <button onclick="calcularAdrenalina()">

        CALCULAR

    </button>

    <div id="resultadoAdrenalina" class="resultado"></div>

</div>

    <button class="btn-voltar" onclick="window.location.href='pediatria.html'">
        VOLTAR
    </button>

    <footer class="footer">
        byRoger
    </footer>

</div>

<script src="pcr.js"></script>

</body>
</html>
